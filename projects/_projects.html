<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects - Hassan Shahir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Container styling */
    .notion-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    /* Header bar styling */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid #eaeaea;
      padding-bottom: 1rem;
    }
    .header-left {
      font-weight: bold;
      font-size: 1.2em;
    }
    .header-left a {
      text-decoration: none;
      color: inherit;
      transition: color 0.3s ease;
    }
    .header-right {
      display: flex;
      align-items: center;
    }
    .header-right a {
      margin-right: 1.5rem;
      text-decoration: none;
      color: inherit;
      font-weight: 500;
      text-transform: lowercase;
      transition: color 0.3s ease;
    }
    .header-right a:last-child {
      margin-right: 0;
    }
    /* Hamburger menu styling */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      width: 24px;
      height: 18px;
      justify-content: space-between;
    }
    .hamburger span {
      display: block;
      height: 3px;
      background: #000;
      border-radius: 2px;
      transition: 0.3s;
    }
    /* Mobile navigation menu styling */
    .mobile-nav {
      display: none;
      flex-direction: column;
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 5px;
      padding: 1rem;
      margin-top: 1rem;
    }
    .mobile-nav a {
      margin: 0.5rem 0;
      text-decoration: none;
      color: inherit;
      transition: color 0.3s ease;
    }
    /* Hover effect for all links */
    a:hover {
      color: #0249fa;
    }
    /* Page Properties (Notion-Style Info) Section */
    .page-properties {
      text-align: center;
    }
    .page-properties h2 {
      margin-bottom: 0.5rem;
    }
    .page-properties p {
      margin: 0.3rem 0;
      color: #707070;
    }
    .notion-divider {
      border-top: 1px solid #eaeaea;
      margin: 2rem 0;
    }
    /* Projects item styling with bullet points */
    .essay-list {
      list-style: disc inside;
      padding-left: 1em;
    }
    .essay-item {
      margin: 0.5em 0;
    }
    .essay-item a {
      text-decoration: none;
      color: #000;
      transition: color 0.3s ease;
    }
    .essay-item a:hover {
      color: #0249fa;
    }
    .item-date {
      color: #707070;
      font-size: 0.9em;
      margin-right: 0.5em;
    }
    /* Responsive styles */
    @media (max-width: 768px) {
      .header-right {
        display: none;
      }
      .hamburger {
        display: flex;
      }
      .mobile-nav {
        display: none;
      }
      .mobile-nav.active {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div class="notion-container">
    <!-- Header Bar -->
    <div class="header-bar">
      <div class="header-left">
        <a href="https://hassanshahir.com">Hassan Shahir</a>
      </div>
      <div class="header-right">
        <a href="../essays/_essays.html">essays</a>
        <a href="../books/_books.html">books</a>
        <a href="_projects.html">projects</a>
      </div>
      <div class="hamburger" onclick="toggleMobileNav()">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <!-- Mobile Navigation Menu -->
    <div class="mobile-nav" id="mobileNav">
      <a href="../essays/_essays.html">essays</a>
      <a href="../books/_books.html">books</a>
      <a href="_projects.html">projects</a>
    </div>

    <!-- Page Properties / Notion-Style Info Section -->
    <div class="page-properties">
      <h2>Projects</h2>
      <p>A showcase of my personal and collaborative projects in tech and beyond.</p>
      <p>Last Updated: December 7, 2024</p>
    </div>

    <!-- Divider -->
    <div class="notion-divider"></div>
    <!-- Manual Listing of Projects -->
    <p>Coming Soon... This website is still under construction.</p>
  </div>

  <script>
    function toggleMobileNav() {
      var mobileNav = document.getElementById('mobileNav');
      mobileNav.classList.toggle('active');
    }
  </script>
</body>
</html>
